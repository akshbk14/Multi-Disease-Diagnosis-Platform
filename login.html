<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Suite - Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { height: 100vh; background-color: #0b0f19; background-image: radial-gradient(circle at 50% 0%, #16223f 0%, #0b0f19 70%); color: #f3f4f6; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; padding: 45px 40px; border-radius: 16px; background: #111827; border: 1px solid #1f2937; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; text-align: center; letter-spacing: -0.5px; }
        .subtitle { font-size: 13px; color: #9ca3af; margin-bottom: 30px; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #374151; border-radius: 8px; outline: none; font-size: 14px; color: white; background: #1f2937; transition: border-color 0.2s; }
        input:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #3182ce; color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 10px; box-shadow: 0 4px 12px rgba(49, 130, 206, 0.2); }
        button:hover { background: #2b6cb0; transform: translateY(-1px); }
        .link { margin-top: 24px; font-size: 13px; color: #9ca3af; text-align: center; }
        .link a { color: #38bdf8; font-weight: 600; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>System Access Portal</h1>
        <p class="subtitle">Provide clinical tokens to establish secure stream</p>
        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-group"><label>Clinician Email Address</label><input type="email" name="email" placeholder="name@clinic.com" required></div>
            <div class="input-group"><label>Security Password</label><input type="password" name="password" placeholder="••••••••" required></div>
            <button type="submit">Verify Identity Token</button>
            <div class="link">Awaiting authorization values?<a href="{{ url_for('register') }}"> Register here</a></div>
        </form>
    </div>
</body>
</html>
