<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Suite - Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { min-height: 100vh; background-color: #0b0f19; background-image: radial-gradient(circle at 50% 0%, #16223f 0%, #0b0f19 70%); color: #f3f4f6; display: flex; justify-content: center; align-items: center; padding: 30px 20px; }
        .container { width: 100%; max-width: 440px; padding: 45px 40px; border-radius: 16px; background: #111827; border: 1px solid #1f2937; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        h1 { text-align: center; margin-bottom: 6px; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .subtitle { text-align: center; color: #9ca3af; font-size: 13px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #374151; border-radius: 8px; outline: none; font-size: 14px; color: white; background: #1f2937; transition: border-color 0.2s; }
        input:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 8px; background: #3182ce; color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(49, 130, 206, 0.2); }
        button:hover { background: #2b6cb0; transform: translateY(-1px); }
        .link { text-align: center; margin-top: 24px; font-size: 14px; color: #9ca3af; }
        .link a { color: #38bdf8; text-decoration: none; font-weight: 600; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Initialize Account</h1>
        <p class="subtitle">Establish dynamic credentials into the security layer</p>
        <form action="{{ url_for('register') }}" method="POST">
            <div class="input-group"><label>Clinician Reference Name</label><input type="text" name="username" placeholder="e.g., Dr. Jenkins" required></div>
            <div class="input-group"><label>Corporate Email Address</label><input type="email" name="email" placeholder="name@clinic.com" required></div>
            <div class="input-group"><label>Account Access Password</label><input type="password" name="password" placeholder="••••••••" required></div>
            <button type="submit">Provision Core Credentials</button>
            <div class="link">Already hold profile access tokens?<a href="{{ url_for('login') }}"> Sign In</a></div>
        </form>
    </div>
</body>
</html>
